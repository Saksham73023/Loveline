<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shayari 1 ❤️</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #fff0f5, #ffe4ec);
      min-height: 100vh;
    }

    .box {
      padding: 60px 20px;
    }

    h1 {
      color: #e91e63;
      margin-bottom: 20px;
    }

    .shayari {
      max-width: 700px;
      margin: auto;
      font-size: 24px;
      line-height: 1.8;
      color: #444;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.12);
    }

    a {
      display: inline-block;
      margin-top: 30px;
      text-decoration: none;
      background: #ff4d88;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sirf Tumhare Liye ❤️</h1>

    <div class="shayari">
      <p>
        <b>S</b>eene me basa liya hai tumhe is kadar,<br>
        <b>S</b>och bhi nahi sakta tum bin ek pal yaar,<br>
        <b>S</b>apno me bhi aati ho tum muskurake,<br>
        <b>S</b>ach kahu to tum hi ho meri har khushi ka sansaar ❤️
      </p>
    </div>

    <a href="index.html">Back</a>
  </div>
</body>
</html>
